<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoC2 Parser Formatter</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  @font-face {
    font-family: 'DM Mono';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url('./fonts/dm-mono-400.woff2') format('woff2');
  }
  @font-face {
    font-family: 'DM Mono';
    font-style: normal;
    font-weight: 500;
    font-display: swap;
    src: url('./fonts/dm-mono-500.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Fraunces';
    font-style: normal;
    font-weight: 300;
    font-display: swap;
    src: url('./fonts/fraunces-300.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Fraunces';
    font-style: italic;
    font-weight: 300;
    font-display: swap;
    src: url('./fonts/fraunces-300-italic.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Fraunces';
    font-style: normal;
    font-weight: 500;
    font-display: swap;
    src: url('./fonts/fraunces-500.woff2') format('woff2');
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #141210;
    --surface:      #1c1917;
    --border:       #2e2a26;
    --border-strong:#3d3730;
    --text:         #f0ece6;
    --text-muted:   #8a8078;
    --accent:       #7ab89a;
    --accent-hover: #96cdb4;
    --accent-fg:    #0d2018;
    --danger:       #e07070;
    --danger-bg:    #2a1515;
    --danger-border:#4a2020;
    --success:      #7ab89a;
    --success-bg:   #0d2018;
    --radius:       6px;
    --mono:         'DM Mono', 'Fira Mono', monospace;
    --serif:        'Fraunces', Georgia, serif;
    --editor-font-size: clamp(0.8rem, 1vw, 1.05rem);

    /* bracket depth — dark */
    --d1:#7a3a00;--d2:#1a5c10;--d3:#0a4a6e;--d4:#6e1060;
    --d5:#4a0a0a;--d6:#1a3a7a;--d7:#0a5a3a;--d8:#5a4a00;
    --d9:#3a0a5a;--d10:#006a3a;--d11:#6a2a00;--d12:#003a6a;
    --d13:#5a1a1a;--d14:#1a5a1a;--d15:#4a004a;--d16:#006a6a;
    --d17:#6a4a1a;--d18:#1a006a;--d19:#005a1a;--d20:#6a001a;
    --d21:#2a4a00;--d22:#5a005a;--d23:#004a5a;--d24:#6a3a3a;
    --d25:#003a4a;--d26:#4a3a00;--d27:#1a4a4a;--d28:#5a1a4a;
    --d29:#2a5a00;--d30:#4a1a5a;--d31:#005a5a;--d32:#5a3a1a;

    --indent-marker: rgba(240, 236, 230, 0.32);
    --indent-marker-active: rgba(240, 236, 230, 0.55);
  }

  [data-theme="light"] {
    --bg:           #f5f2ed;
    --surface:      #faf8f5;
    --border:       #d8d2c8;
    --border-strong:#b8b0a2;
    --text:         #1c1917;
    --text-muted:   #6b6560;
    --accent:       #2d4a3e;
    --accent-hover: #1e3329;
    --accent-fg:    #e8f0ec;
    --danger:       #7a2e2e;
    --danger-bg:    #fdf0f0;
    --danger-border:#e8c0c0;
    --success:      #1e4d35;
    --success-bg:   #eef5f0;

    /* bracket depth — light */
    --d1:#ffcc66;--d2:#88ee88;--d3:#66ccff;--d4:#ff88cc;
    --d5:#ff8866;--d6:#aa88ff;--d7:#66ffcc;--d8:#ffdd88;
    --d9:#cc88ff;--d10:#88ffaa;--d11:#88aaff;--d12:#ffaa66;
    --d13:#aaff88;--d14:#ff88aa;--d15:#66eeff;--d16:#ffee66;
    --d17:#ff6688;--d18:#88ccff;--d19:#aaff66;--d20:#ff66cc;
    --d21:#66ffaa;--d22:#ffaa88;--d23:#88ffee;--d24:#ff9966;
    --d25:#99aaff;--d26:#ccff66;--d27:#ff66aa;--d28:#66ffdd;
    --d29:#ffbb66;--d30:#aa66ff;--d31:#66ffbb;--d32:#ff8899;

    --indent-marker: rgba(28, 25, 23, 0.22);
    --indent-marker-active: rgba(28, 25, 23, 0.40);
  }

  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100vw;
  }

  /* ── topbar ── */
  .topbar {
    display: grid;
    grid-template-columns: auto minmax(0, 1fr);
    grid-template-areas:
      "title counts"
      "toolbar toolbar";
    align-items: center;
    padding: 0.45rem 2vw;
    height: auto;
    min-height: 36px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    gap: 0.5rem;
    row-gap: 0.35rem;
  }
  .topbar-title {
    grid-area: title;
    font-family: var(--serif);
    font-weight: 300;
    font-size: clamp(1rem, 1.6vw, 1.4rem);
    letter-spacing: -0.02em;
    flex-shrink: 0;
  }
  .toolbar {
    grid-area: toolbar;
    display: flex;
    gap: 0.6vw;
    align-items: center;
    justify-self: stretch;
    width: 100%;
    max-width: 100%;
    overflow: visible;
    min-width: 0;
  }
  .toolbar-counts {
    grid-area: counts;
    display: flex;
    gap: 0.6vw;
    align-items: center;
    flex-wrap: nowrap;
    justify-self: end;
    min-width: 0;
    max-width: 100%;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
    white-space: nowrap;
  }
  .toolbar-counts::-webkit-scrollbar { display: none; }
  .toolbar-buttons {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.6vw;
    width: 100%;
  }
  .toolbar-field {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 0.35vw;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: clamp(0.65rem, 0.75vw, 0.85rem);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .font-size-control {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
  }
  .toolbar-field input {
    width: 3.4rem;
    min-height: 2.15rem;
    padding: 0.5vh 0.55rem;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: var(--mono);
    font-size: inherit;
    letter-spacing: 0;
    text-align: center;
  }
  .toolbar-field input:hover,
  .toolbar-field input:focus {
    border-color: var(--border-strong);
    outline: none;
  }
  .font-size-step {
    width: 1.8rem;
    min-height: 2.15rem;
    justify-content: center;
    padding-inline: 0;
    font-size: clamp(0.8rem, 0.9vw, 1rem);
  }

  button {
    display: inline-flex;
    align-items: center;
    min-height: 2.15rem;
    gap: 0.4vw;
    padding: 0.5vh 1.1vw;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: var(--mono);
    font-size: clamp(0.65rem, 0.75vw, 0.85rem);
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, transform 0.08s;
    white-space: nowrap;
  }
  button:hover { background: var(--bg); border-color: var(--border-strong); }
  button:active { transform: scale(0.97); }
  /* button.primary { background: var(--accent); border-color: var(--accent); color: var(--accent-fg); font-weight: 500; }
  button.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); } */
  button.active { background: var(--accent); border-color: var(--accent); color: var(--accent-fg); }
  button svg { flex-shrink: 0; width: 1.1em; height: 1.1em; }

  .char-count {
    display: inline-flex;
    align-items: center;
    flex-shrink: 0;
    font-size: clamp(0.9rem, 1.1vw, 1.15rem);
    line-height: 1;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
    padding: 0 0.5vw;
    white-space: nowrap;
  }
  .bracket-warn { color: var(--danger) !important; font-style: italic; }

  @media (max-width: 1000px) {
    .topbar {
      grid-template-columns: minmax(0, 1fr);
      grid-template-areas:
        "title"
        "counts"
        "toolbar";
    }
    .topbar-title,
    .toolbar-counts {
      justify-self: start;
    }
    .toolbar-counts {
      width: 100%;
      margin-left: 0;
    }
  }

  /* ── editor area ── */
  .editor-wrap {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: var(--surface);
  }

  /* CodeMirror host */
  #cm-host {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .cm-trailing-space,
  body .cm-editor .cm-content .cm-trailing-space,
  body .cm-editor .cm-content .cm-trailing-space *,
  body .cm-editor .cm-content [class*="bd"].cm-trailing-space {
    background: #ff2020 !important;
  }

  /* Override CM6 defaults to match our design */
  .cm-editor {
    flex: 1;
    height: 100%;
    font-family: var(--mono) !important;
    font-size: var(--editor-font-size);
    background: var(--surface) !important;
    color: var(--text) !important;
  }
  .cm-editor.cm-focused { outline: none !important; }
  .cm-scroller {
    font-family: var(--mono) !important;
    line-height: 1.75 !important;
    overflow: auto !important;
  }
  .cm-scroller::-webkit-scrollbar { width: 10px; height: 10px; }
  .cm-scroller::-webkit-scrollbar-track { background: #0e0c0a; }
  .cm-scroller::-webkit-scrollbar-thumb { background: #3d3730; border-radius: 5px; border: 2px solid #0e0c0a; }
  .cm-scroller::-webkit-scrollbar-thumb:hover { background: #5a524a; }
  [data-theme="light"] .cm-scroller::-webkit-scrollbar-track { background: #e0dbd4; }
  [data-theme="light"] .cm-scroller::-webkit-scrollbar-thumb { background: #a09080; border-color: #e0dbd4; }
  [data-theme="light"] .cm-scroller::-webkit-scrollbar-thumb:hover { background: #7a7068; }
  .cm-content {
    padding: 2vh 0.75rem 2vh 0 !important;
    caret-color: var(--accent) !important;
    min-height: 100%;
    overflow-wrap: anywhere;
    tab-size: 4;
  }

  /* Gutters */
  .cm-gutters {
    background: #161412 !important;
    border-right: 1px solid var(--border) !important;
    color: #5a5450 !important;
    font-family: var(--mono) !important;
    font-size: var(--editor-font-size) !important;
    min-width: 3.25rem;
  }
  [data-theme="light"] .cm-gutters { background: #edeae4 !important; color: #a09890 !important; }
  .cm-lineNumbers .cm-gutterElement {
    box-sizing: border-box;
    min-width: 3.25rem;
    padding: 0 0.12rem 0 0.35rem !important;
    text-align: right;
  }

  /* Active line */
  .cm-activeLine { background: rgba(255,255,255,0.03) !important; }
  [data-theme="light"] .cm-activeLine { background: rgba(0,0,0,0.03) !important; }
  .cm-activeLineGutter { background: rgba(255,255,255,0.05) !important; }
  [data-theme="light"] .cm-activeLineGutter { background: rgba(0,0,0,0.04) !important; }

  /* Selection */
  .cm-selectionLayer { z-index: 2; }
  .cm-selectionBackground { background: rgba(122,184,154,0.42) !important; }
  [data-theme="light"] .cm-selectionBackground { background: rgba(45,74,62,0.34) !important; }
  .cm-focused .cm-selectionBackground { background: rgba(122,184,154,0.52) !important; }
  [data-theme="light"] .cm-focused .cm-selectionBackground { background: rgba(45,74,62,0.42) !important; }
  body .cm-editor .cm-content .cm-selectedText,
  body .cm-editor .cm-content .cm-selectedText *,
  body .cm-editor .cm-content [class*="bd"].cm-selectedText {
    background: #2f6fed !important;
    color: #fff !important;
  }
  [data-theme="light"] body .cm-editor .cm-content .cm-selectedText,
  [data-theme="light"] body .cm-editor .cm-content .cm-selectedText *,
  [data-theme="light"] body .cm-editor .cm-content [class*="bd"].cm-selectedText {
    background: #1f5fc8 !important;
    color: #fff !important;
  }

  /* Cursor */
  .cm-cursor { border-left-color: var(--accent) !important; }

  /* Placeholder */
  .cm-placeholder { color: var(--text-muted) !important; }

  /* Error line gutter marker */
  .cm-gutter-lint { width: 1.2em; }
  .lint-error-marker {
    color: var(--danger);
    font-size: 0.75em;
    line-height: 1.75;
    cursor: default;
  }

  /* Error diagnostic panel (we use our own inline approach) */
  .cm-diagnostic {
    background: var(--danger-bg) !important;
    border-left: 3px solid var(--danger) !important;
    color: var(--danger) !important;
    font-family: var(--mono) !important;
    font-size: 0.78em !important;
    padding: 0.2em 0.5em !important;
  }
  .cm-diagnosticText { color: var(--danger) !important; }

  /* Bracket depth highlight spans */
  body:not(.no-highlight) .bd1  { background: var(--d1); }
  body:not(.no-highlight) .bd2  { background: var(--d2); }
  body:not(.no-highlight) .bd3  { background: var(--d3); }
  body:not(.no-highlight) .bd4  { background: var(--d4); }
  body:not(.no-highlight) .bd5  { background: var(--d5); }
  body:not(.no-highlight) .bd6  { background: var(--d6); }
  body:not(.no-highlight) .bd7  { background: var(--d7); }
  body:not(.no-highlight) .bd8  { background: var(--d8); }
  body:not(.no-highlight) .bd9  { background: var(--d9); }
  body:not(.no-highlight) .bd10 { background: var(--d10); }
  body:not(.no-highlight) .bd11 { background: var(--d11); }
  body:not(.no-highlight) .bd12 { background: var(--d12); }
  body:not(.no-highlight) .bd13 { background: var(--d13); }
  body:not(.no-highlight) .bd14 { background: var(--d14); }
  body:not(.no-highlight) .bd15 { background: var(--d15); }
  body:not(.no-highlight) .bd16 { background: var(--d16); }
  body:not(.no-highlight) .bd17 { background: var(--d17); }
  body:not(.no-highlight) .bd18 { background: var(--d18); }
  body:not(.no-highlight) .bd19 { background: var(--d19); }
  body:not(.no-highlight) .bd20 { background: var(--d20); }
  body:not(.no-highlight) .bd21 { background: var(--d21); }
  body:not(.no-highlight) .bd22 { background: var(--d22); }
  body:not(.no-highlight) .bd23 { background: var(--d23); }
  body:not(.no-highlight) .bd24 { background: var(--d24); }
  body:not(.no-highlight) .bd25 { background: var(--d25); }
  body:not(.no-highlight) .bd26 { background: var(--d26); }
  body:not(.no-highlight) .bd27 { background: var(--d27); }
  body:not(.no-highlight) .bd28 { background: var(--d28); }
  body:not(.no-highlight) .bd29 { background: var(--d29); }
  body:not(.no-highlight) .bd30 { background: var(--d30); }
  body:not(.no-highlight) .bd31 { background: var(--d31); }
  body:not(.no-highlight) .bd32 { background: var(--d32); }

  /* ── statusbar ── */
  .statusbar {
    height: 4vh;
    min-height: 24px;
    display: flex;
    align-items: center;
    padding: 0 2vw;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .status {
    font-size: clamp(0.9rem, 1.1vw, 1.15rem);
    opacity: 0;
    pointer-events: none;
    letter-spacing: 0.03em;
    transition: opacity 0.15s;
  }
  .status.show { opacity: 1; }
  .status.ok  { color: var(--success); }
  .status.err { color: var(--danger); }

  /* ── confirm dialog ── */
  .confirm-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .confirm-dialog {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: calc(var(--radius) * 1.5);
    padding: 1.8rem 2rem;
    min-width: 260px; max-width: 360px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    display: flex; flex-direction: column; gap: 0.6rem;
  }
  .confirm-title { font-family: var(--serif); font-size: 1.1rem; font-weight: 500; }
  .confirm-message { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 0.4rem; }
  .confirm-actions { display: flex; gap: 0.6rem; justify-content: flex-end; margin-top: 0.4rem; }
  .confirm-actions button { font-size: 0.78rem; padding: 0.45rem 1.1rem; }
  .danger-btn { background: var(--danger) !important; border-color: var(--danger) !important; color: #fff !important; }
  .danger-btn:hover { opacity: 0.88; }

  /* ── search panel ── */
  .search-panel {
    position: fixed;
    top: 0.4rem;
    right: max(2vw, 0.5rem);
    z-index: 50;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.45rem 0.55rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    display: flex;
    flex-direction: row;
    gap: 0.35rem;
    min-width: 360px;
    max-width: calc(100vw - 1rem);
    font-family: var(--mono);
    font-size: clamp(0.65rem, 0.75vw, 0.85rem);
  }
  .search-panel-rows {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
    flex: 1;
    min-width: 0;
  }
  .search-panel-row {
    display: flex;
    align-items: center;
    gap: 0.35rem;
  }
  .search-panel input[type="text"] {
    width: 10rem;
    flex: 0 0 10rem;
    min-width: 0;
    padding: 0.35rem 0.5rem;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: inherit;
    outline: none;
  }
  .search-panel input[type="text"]:focus {
    border-color: var(--accent);
  }
  .search-panel input[type="text"]::placeholder {
    color: var(--text-muted);
  }
  .search-panel-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 1.8rem;
    height: 1.8rem;
    min-width: 1.8rem;
    min-height: 1.8rem;
    padding: 0;
    border-radius: var(--radius);
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
    flex-shrink: 0;
  }
  .search-panel-btn:hover {
    background: var(--bg);
    color: var(--text);
    border-color: var(--border);
  }
  .search-panel-btn.active {
    background: var(--accent);
    color: var(--accent-fg);
    border-color: var(--accent);
  }
  .search-panel-btn svg {
    width: 0.95em;
    height: 0.95em;
  }
  .search-panel-btn.search-option-btn {
    width: auto;
    min-width: 1.8rem;
    padding: 0 0.3rem;
    font-size: 0.78em;
    font-family: var(--mono);
    font-weight: 600;
    letter-spacing: 0;
  }
  .search-panel-btn.search-replace-action {
    width: auto;
    min-width: auto;
    padding: 0 0.5rem;
    font-size: inherit;
    font-family: var(--mono);
    letter-spacing: 0.03em;
  }
  .search-panel-btn.search-toggle-replace {
    width: 1.8rem;
    min-width: 1.8rem;
    align-self: stretch;
    height: auto;
    flex-shrink: 0;
  }
  .search-panel-replace-row.visible .search-toggle-replace-spacer {
    display: block;
  }

  .search-panel-count {
    color: var(--text-muted);
    font-size: 0.72em;
    white-space: nowrap;
    padding: 0 0.25rem;
    min-width: 3.5rem;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .search-panel-count.zero {
    color: var(--danger);
  }
  .search-panel-replace-row {
    display: none;
  }
  .search-panel-replace-row.visible {
    display: flex;
  }

  .cm-search-match-all,
  body .cm-editor .cm-content .cm-search-match-all,
  body .cm-editor .cm-content .cm-search-match-all *,
  body .cm-editor .cm-content [class*="bd"].cm-search-match-all {
    background: #0cd4a9 !important;
    color: #fff !important;
    border-radius: 2px;
  }
  [data-theme="light"] body .cm-editor .cm-content .cm-search-match-all,
  [data-theme="light"] body .cm-editor .cm-content .cm-search-match-all *,
  [data-theme="light"] body .cm-editor .cm-content [class*="bd"].cm-search-match-all {
    background: #009919 !important;
    color: #fff !important;
  }

  /* ── narrow / portrait ── */
  @media (max-width: 600px), (orientation: portrait) and (max-width: 900px) {
    .topbar {
      padding: 0.5vh 3vw;
      gap: 0;
      row-gap: 0.15rem;
    }
    .topbar-title { flex-shrink: 0; font-size: clamp(0.9rem, 3.5vw, 1.2rem); padding-top: 0.2vh; }
    .toolbar-counts { display: flex; gap: 1.5vw; margin-left: 0; align-items: center; flex-wrap: nowrap; overflow-x: auto; white-space: nowrap; }
    .toolbar { grid-area: toolbar; justify-self: stretch; width: 100%; max-width: 100%; padding-bottom: 0.4vh; overflow: visible; }
    .toolbar-buttons { display: flex; flex-wrap: wrap; width: 100%; gap: 1.5vw; }
    .toolbar-field { flex-shrink: 0; font-size: clamp(0.6rem, 2.4vw, 0.78rem); }
    .font-size-control { gap: 0.35rem; }
    .toolbar-field input { width: 3.4rem; min-height: 2.15rem; padding: 0.6vh 0.45rem; }
    .font-size-step { width: 1.8rem; min-height: 2.15rem; padding-inline: 0; }
    button { min-height: 2.15rem; padding: 0.6vh 2vw; font-size: clamp(0.6rem, 2.4vw, 0.78rem); flex-shrink: 0; }
    .char-count { flex-shrink: 0; font-size: clamp(0.72rem, 2.8vw, 0.9rem); line-height: 1; padding: 0; white-space: nowrap; }
    .cm-lineNumbers .cm-gutterElement {
      padding-right: 0.12rem !important;
    }
    .search-panel {
      min-width: 0;
      width: calc(100vw - 1rem);
    }
    .search-panel input[type="text"] {
      width: 0;
      flex: 1 1 0;
    }
    .search-panel-count {
      min-width: 2.5rem;
    }
  }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">CoC2 Parser Formatter</span>
  <div class="toolbar-counts">
    <span class="char-count" id="wordCount">0 words</span>
    <span class="char-count" id="charCount">0 chars</span>
    <span class="char-count" id="bracketCount" title="Opening [ and closing ] bracket counts">[0 / ]0</span>
    <span class="char-count" id="curlyCount" title="Opening { and closing } bracket counts">{0 / }0</span>
    <span class="char-count bracket-warn" id="bracketWarn" style="display:none">Unequal Brackets!</span>
  </div>
  <div class="toolbar">
    <div class="toolbar-buttons">
      <button id="themeToggle" onclick="toggleTheme()" title="Toggle light/dark mode">
        <svg id="themeIconMoon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="themeIconSun" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <span id="themeLabel">Light</span>
      </button>
      <button id="curlyToggle" class="active" onclick="toggleCurlyFormatting()" title="Toggle curly bracket formatting and counts">
        <span id="curlyLabel">{}</span>
      </button>
      <button id="highlightToggle" class="active" onclick="toggleHighlight()" title="Toggle bracket depth highlighting">
        <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Highlight
      </button>
      <button id="trailingSpaceToggle" onclick="toggleTrailingSpaces()" title="Toggle trailing space highlighting">
        <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 1 2-2v-4M9 21H5a2 2 0 0 0-2-2v-4m0 0h18"/></svg>
        Trailing
      </button>
      <button id="searchToggle" onclick="toggleSearch()" title="Find and Replace (Ctrl+F)">
        <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Find
      </button>
      <button id="indentToggle" onclick="toggleIndent()" title="Toggle formatter indentation between spaces and tabs">
        <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h10"/><path d="M4 12h14"/><path d="M4 17h10"/><path d="M17 7l3 5-3 5"/></svg>
        <span id="indentLabel">Spaces</span>
      </button>
      <button onclick="runFormat()">
        <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M4 12h10M4 18h14"/></svg>
        Format
      </button>
      <button onclick="runCompress()" title="Compress parser formatting">
        <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 8h16"/><path d="M8 4l-4 4 4 4"/><path d="M20 16H4"/><path d="M16 12l4 4-4 4"/></svg>
        Compress
      </button>
      <div class="toolbar-field" title="Editor font size">
        <span class="font-size-control">
          <button class="font-size-step" type="button" onclick="adjustFontSize(-1)" title="Decrease editor font size" aria-label="Decrease editor font size">-</button>
          <input id="fontSizeInput" type="text" inputmode="numeric" pattern="[0-9]*" onchange="setFontSize(this.value)" onkeydown="commitFontSizeInput(event)" aria-label="Editor font size">
          <button class="font-size-step" type="button" onclick="adjustFontSize(1)" title="Increase editor font size" aria-label="Increase editor font size">+</button>
        </span>
      </div>
      <button onclick="copyText()">
        <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy
      </button>
      <button onclick="clearAll()">
        <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        Clear
      </button>
    </div>
  </div>
</div>

<!-- Search Panel (hidden by default) -->
<div class="search-panel" id="searchPanel" style="display:none">
  <button class="search-panel-btn search-toggle-replace" id="searchToggleReplace" onclick="toggleSearchReplace()" title="Toggle Replace (Ctrl+H)">
    <span id="searchToggleReplaceIcon" style="font-size:0.85em;font-weight:700;line-height:1;">&#x276F;</span>
  </button>
  <div class="search-panel-rows">
    <div class="search-panel-row">
      <input type="text" id="searchInput" placeholder="Find" spellcheck="false" oninput="onSearchInput()" onkeydown="onSearchKeyDown(event)" />
      <button class="search-panel-btn search-option-btn" id="searchCaseBtn" onclick="toggleSearchCase()" title="Match Case (Alt+C)">Aa</button>
      <button class="search-panel-btn search-option-btn" id="searchRegexBtn" onclick="toggleSearchRegex()" title="Use Regular Expression (Alt+R)">.*</button>
      <span class="search-panel-count" id="searchCount">0/0</span>
      <button class="search-panel-btn" onclick="searchPrev()" title="Previous Match (Shift+Enter)">
        <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><polyline points="18 15 12 9 6 15"/></svg>
      </button>
      <button class="search-panel-btn" onclick="searchNext()" title="Next Match (Enter)">
        <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <button class="search-panel-btn" onclick="closeSearch()" title="Close (Escape)">
        <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="search-panel-replace-row" id="searchReplaceRow">
      <input type="text" id="replaceInput" placeholder="Replace" spellcheck="false" onkeydown="onReplaceKeyDown(event)" />
      <button class="search-panel-btn search-replace-action" onclick="replaceOne()" title="Replace">
        Replace
      </button>
      <button class="search-panel-btn search-replace-action" onclick="replaceAll()" title="Replace All (Ctrl+Shift+Enter)">
        Replace All
      </button>
    </div>
  </div>
</div>

<div class="editor-wrap">
  <div id="cm-host"></div>
</div>

<div class="statusbar">
  <div class="status" id="status" role="status" aria-live="polite"></div>
</div>

<script type="module" src="CoC2-Parser-Formatter.js"></script>
</body>
</html>
