<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoC2 Passage Formatter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #141210;
    --surface:      #1c1917;
    --border:       #2e2a26;
    --border-strong:#3d3730;
    --text:         #f0ece6;
    --text-muted:   #8a8078;
    --accent:       #7ab89a;
    --accent-hover: #96cdb4;
    --accent-fg:    #0d2018;
    --danger:       #e07070;
    --danger-bg:    #2a1515;
    --danger-border:#4a2020;
    --success:      #7ab89a;
    --success-bg:   #0d2018;
    --radius:       6px;
    --mono:         'DM Mono', 'Fira Mono', monospace;
    --serif:        'Fraunces', Georgia, serif;
    --editor-font-size: clamp(0.8rem, 1vw, 1.05rem);

    /* bracket depth — dark */
    --d1:#7a6400;--d2:#1e5c18;--d3:#0e4f60;--d4:#6b2050;
    --d5:#6b3a00;--d6:#3d2878;--d7:#0e5038;--d8:#6b4400;
    --d9:#6b1a1a;--d10:#3a5a10;--d11:#1a3070;--d12:#6b4010;
    --d13:#3a5a00;--d14:#6b2038;--d15:#0e4848;--d16:#4a2068;
  }

  [data-theme="light"] {
    --bg:           #f5f2ed;
    --surface:      #faf8f5;
    --border:       #d8d2c8;
    --border-strong:#b8b0a2;
    --text:         #1c1917;
    --text-muted:   #6b6560;
    --accent:       #2d4a3e;
    --accent-hover: #1e3329;
    --accent-fg:    #e8f0ec;
    --danger:       #7a2e2e;
    --danger-bg:    #fdf0f0;
    --danger-border:#e8c0c0;
    --success:      #1e4d35;
    --success-bg:   #eef5f0;

    /* bracket depth — light */
    --d1:#ffe066;--d2:#a8f0a0;--d3:#a0e8f8;--d4:#ffb3de;
    --d5:#ffcc99;--d6:#c8b4f8;--d7:#b4f0d8;--d8:#f8d4a0;
    --d9:#ff9e9e;--d10:#d4f0a0;--d11:#b0c8ff;--d12:#ffd6a0;
    --d13:#e0f8b0;--d14:#f8b4c8;--d15:#a8e8e8;--d16:#e8c8f8;
  }

  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100vw;
  }

  /* ── topbar ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2vw;
    height: 6vh;
    min-height: 36px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    gap: 0.5rem;
  }
  .topbar-title {
    font-family: var(--serif);
    font-weight: 300;
    font-size: clamp(1rem, 1.6vw, 1.4rem);
    letter-spacing: -0.02em;
    flex-shrink: 0;
  }
  .toolbar {
    display: flex;
    gap: 0.6vw;
    align-items: center;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
    min-width: 0;
  }
  .toolbar::-webkit-scrollbar { display: none; }
  .toolbar-counts { display: flex; gap: 0.6vw; align-items: center; }
  .toolbar-buttons { display: contents; }

  button {
    display: inline-flex;
    align-items: center;
    gap: 0.4vw;
    padding: 0.5vh 1.1vw;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: var(--mono);
    font-size: clamp(0.65rem, 0.75vw, 0.85rem);
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, transform 0.08s;
    white-space: nowrap;
  }
  button:hover { background: var(--bg); border-color: var(--border-strong); }
  button:active { transform: scale(0.97); }
  button.primary { background: var(--accent); border-color: var(--accent); color: var(--accent-fg); font-weight: 500; }
  button.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  button.active { background: var(--accent); border-color: var(--accent); color: var(--accent-fg); }
  button svg { flex-shrink: 0; width: 1.1em; height: 1.1em; }

  .char-count {
    font-size: clamp(0.75rem, 0.9vw, 0.95rem);
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
    padding: 0 0.5vw;
  }
  .bracket-warn { color: var(--danger) !important; font-style: italic; }

  /* ── editor area ── */
  .editor-wrap {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: var(--surface);
  }

  /* CodeMirror host */
  #cm-host {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Override CM6 defaults to match our design */
  .cm-editor {
    flex: 1;
    height: 100%;
    font-family: var(--mono) !important;
    font-size: var(--editor-font-size);
    background: var(--surface) !important;
    color: var(--text) !important;
  }
  .cm-editor.cm-focused { outline: none !important; }
  .cm-scroller {
    font-family: var(--mono) !important;
    line-height: 1.75 !important;
    overflow: auto !important;
  }
  .cm-content {
    padding: 2vh 0.75rem 2vh 0 !important;
    caret-color: var(--accent) !important;
    min-height: 100%;
    overflow-wrap: anywhere;
  }

  /* Gutters */
  .cm-gutters {
    background: #161412 !important;
    border-right: 1px solid var(--border) !important;
    color: #5a5450 !important;
    font-family: var(--mono) !important;
    font-size: var(--editor-font-size) !important;
    min-width: 3.25rem;
  }
  [data-theme="light"] .cm-gutters { background: #edeae4 !important; color: #a09890 !important; }
  .cm-lineNumbers .cm-gutterElement {
    box-sizing: border-box;
    min-width: 3.25rem;
    padding: 0 0.12rem 0 0.35rem !important;
    text-align: right;
  }

  /* Active line */
  .cm-activeLine { background: rgba(255,255,255,0.03) !important; }
  [data-theme="light"] .cm-activeLine { background: rgba(0,0,0,0.03) !important; }
  .cm-activeLineGutter { background: rgba(255,255,255,0.05) !important; }
  [data-theme="light"] .cm-activeLineGutter { background: rgba(0,0,0,0.04) !important; }

  /* Selection */
  .cm-selectionLayer { z-index: 2; }
  .cm-selectionBackground { background: rgba(122,184,154,0.42) !important; }
  [data-theme="light"] .cm-selectionBackground { background: rgba(45,74,62,0.34) !important; }
  .cm-focused .cm-selectionBackground { background: rgba(122,184,154,0.52) !important; }
  [data-theme="light"] .cm-focused .cm-selectionBackground { background: rgba(45,74,62,0.42) !important; }
  body .cm-editor .cm-content .cm-selectedText,
  body .cm-editor .cm-content .cm-selectedText *,
  body .cm-editor .cm-content [class*="bd"].cm-selectedText {
    background: #2f6fed !important;
    color: #fff !important;
  }
  [data-theme="light"] body .cm-editor .cm-content .cm-selectedText,
  [data-theme="light"] body .cm-editor .cm-content .cm-selectedText *,
  [data-theme="light"] body .cm-editor .cm-content [class*="bd"].cm-selectedText {
    background: #1f5fc8 !important;
    color: #fff !important;
  }

  /* Cursor */
  .cm-cursor { border-left-color: var(--accent) !important; }

  /* Placeholder */
  .cm-placeholder { color: var(--text-muted) !important; }

  /* Error line gutter marker */
  .cm-gutter-lint { width: 1.2em; }
  .lint-error-marker {
    color: var(--danger);
    font-size: 0.75em;
    line-height: 1.75;
    cursor: default;
  }

  /* Error diagnostic panel (we use our own inline approach) */
  .cm-diagnostic {
    background: var(--danger-bg) !important;
    border-left: 3px solid var(--danger) !important;
    color: var(--danger) !important;
    font-family: var(--mono) !important;
    font-size: 0.78em !important;
    padding: 0.2em 0.5em !important;
  }
  .cm-diagnosticText { color: var(--danger) !important; }

  /* Bracket depth highlight spans */
  body:not(.no-highlight) .bd1  { background: var(--d1); }
  body:not(.no-highlight) .bd2  { background: var(--d2); }
  body:not(.no-highlight) .bd3  { background: var(--d3); }
  body:not(.no-highlight) .bd4  { background: var(--d4); }
  body:not(.no-highlight) .bd5  { background: var(--d5); }
  body:not(.no-highlight) .bd6  { background: var(--d6); }
  body:not(.no-highlight) .bd7  { background: var(--d7); }
  body:not(.no-highlight) .bd8  { background: var(--d8); }
  body:not(.no-highlight) .bd9  { background: var(--d9); }
  body:not(.no-highlight) .bd10 { background: var(--d10); }
  body:not(.no-highlight) .bd11 { background: var(--d11); }
  body:not(.no-highlight) .bd12 { background: var(--d12); }
  body:not(.no-highlight) .bd13 { background: var(--d13); }
  body:not(.no-highlight) .bd14 { background: var(--d14); }
  body:not(.no-highlight) .bd15 { background: var(--d15); }
  body:not(.no-highlight) .bd16 { background: var(--d16); }

  /* ── statusbar ── */
  .statusbar {
    height: 4vh;
    min-height: 24px;
    display: flex;
    align-items: center;
    padding: 0 2vw;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .status {
    font-size: clamp(0.6rem, 0.7vw, 0.75rem);
    opacity: 0;
    pointer-events: none;
    letter-spacing: 0.03em;
    transition: opacity 0.15s;
  }
  .status.show { opacity: 1; }
  .status.ok  { color: var(--success); }
  .status.err { color: var(--danger); }

  /* ── confirm dialog ── */
  .confirm-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .confirm-dialog {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: calc(var(--radius) * 1.5);
    padding: 1.8rem 2rem;
    min-width: 260px; max-width: 360px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    display: flex; flex-direction: column; gap: 0.6rem;
  }
  .confirm-title { font-family: var(--serif); font-size: 1.1rem; font-weight: 500; }
  .confirm-message { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 0.4rem; }
  .confirm-actions { display: flex; gap: 0.6rem; justify-content: flex-end; margin-top: 0.4rem; }
  .confirm-actions button { font-size: 0.78rem; padding: 0.45rem 1.1rem; }
  .danger-btn { background: var(--danger) !important; border-color: var(--danger) !important; color: #fff !important; }
  .danger-btn:hover { opacity: 0.88; }

  /* ── narrow / portrait ── */
  @media (max-width: 600px), (orientation: portrait) and (max-width: 900px) {
    .topbar { flex-wrap: wrap; height: auto; min-height: unset; padding: 0.5vh 3vw; gap: 0; row-gap: 0.15rem; }
    .topbar-title { flex-shrink: 0; font-size: clamp(0.9rem, 3.5vw, 1.2rem); padding-top: 0.2vh; }
    .toolbar-counts { display: flex; gap: 1.5vw; margin-left: auto; align-items: center; }
    .toolbar-buttons { display: flex; width: 100%; gap: 1.5vw; padding-bottom: 0.4vh; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; }
    .toolbar-buttons::-webkit-scrollbar { display: none; }
    button { padding: 0.6vh 2vw; font-size: clamp(0.6rem, 2.4vw, 0.78rem); flex-shrink: 0; }
    .char-count { flex-shrink: 0; font-size: clamp(0.72rem, 2.8vw, 0.9rem); padding: 0; }
    .cm-lineNumbers .cm-gutterElement {
      padding-right: 0.12rem !important;
    }
  }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">CoC2 Passage Formatter</span>
  <div class="toolbar-counts">
    <span class="char-count" id="wordCount">0 words</span>
    <span class="char-count" id="charCount">0 chars</span>
    <span class="char-count" id="bracketCount" title="Opening [ and closing ] bracket counts">[0 / ]0</span>
    <span class="char-count bracket-warn" id="bracketWarn" style="display:none">Unequal Brackets!</span>
  </div>
  <div class="toolbar">
    <div class="toolbar-buttons">
      <button id="themeToggle" onclick="toggleTheme()" title="Toggle light/dark mode">
        <svg id="themeIconMoon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="themeIconSun" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <span id="themeLabel">Light</span>
      </button>
      <button id="highlightToggle" class="active" onclick="toggleHighlight()" title="Toggle bracket depth highlighting">
        <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Highlight
      </button>
      <button id="indentToggle" onclick="toggleIndent()" title="Toggle formatter indentation between spaces and tabs">
        <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h10"/><path d="M4 12h14"/><path d="M4 17h10"/><path d="M17 7l3 5-3 5"/></svg>
        <span id="indentLabel">Spaces</span>
      </button>
      <button class="primary" onclick="runFormat()">
        <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M4 12h10M4 18h14"/></svg>
        Format
      </button>
      <button onclick="copyText()">
        <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy
      </button>
      <button onclick="clearAll()">
        <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        Clear
      </button>
    </div>
  </div>
</div>

<div class="editor-wrap">
  <div id="cm-host"></div>
</div>

<div class="statusbar">
  <div class="status" id="status" role="status" aria-live="polite"></div>
</div>

<script type="module" src="CoC2-Passage-Formatter.js"></script>
</body>
</html>
